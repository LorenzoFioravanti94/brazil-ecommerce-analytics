name: ci

on:
  pull_request:
    branches: [develop, main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          pip install dbt-core==1.11.8 dbt-duckdb==1.10.1 kaggle

      - name: Install dbt packages
        run: dbt deps --project-dir brz_ecommerce_backend

      - name: Configure Kaggle API Token
        run: |
          mkdir -p ~/.kaggle
          echo "${{ secrets.KAGGLE_API_TOKEN }}" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Download datasets
        run: |
          mkdir -p data/raw/olist data/raw/ibge
          kaggle datasets download -d olistbr/brazilian-ecommerce -p data/raw/olist --unzip
          kaggle datasets download -d thiagobodruk/brazilianstates -p data/raw/ibge --unzip

      - name: Run ingestion
        run: python scripts/data_ingestion.py
        env:
          DBT_TARGET: test

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          brz_ecommerce_backend:
            target: test
            outputs:
              test:
                type: duckdb
                path: /tmp/test.duckdb
                threads: 2
          EOF

      - name: dbt debug
        run: dbt debug --project-dir brz_ecommerce_backend

      # ======================================================
      # BASELINE MANIFEST (MAIN)
      # ======================================================
      - name: Download baseline manifest (main)
        if: github.base_ref == 'develop'
        run: |
          mkdir -p state
          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -o state/manifest.json \
            https://github.com/${{ github.repository }}/releases/latest/download/manifest.json

      # ======================================================
      # SLIM CI (DEVELOP)
      # ======================================================
      - name: Slim CI
        if: github.base_ref == 'develop'
        run: |
          dbt parse --target test --project-dir brz_ecommerce_backend

          dbt build \
            --select state:modified+ \
            --defer \
            --state state \
            --target test \
            --project-dir brz_ecommerce_backend

      # ======================================================
      # FULL CI (MAIN)
      # ======================================================
      - name: Full CI
        if: github.base_ref == 'main'
        run: |
          dbt build \
            --target test \
            --project-dir brz_ecommerce_backend

      # ======================================================
      # GENERATE PR MANIFEST (FINAL SNAPSHOT)
      # ======================================================
      - name: Generate manifest
        run: |
          dbt parse --target test --project-dir brz_ecommerce_backend

      - name: Upload PR manifest
        uses: actions/upload-artifact@v6
        with:
          name: dbt-manifest
          path: brz_ecommerce_backend/target/manifest.json